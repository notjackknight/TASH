name = "tash-skin"
pages_build_output_dir = "dist"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Non-secret env vars. Once a project has a wrangler.toml, Cloudflare reads
# plaintext vars from here and locks the Dashboard to Secrets only — so these
# must live here. SQUARE_ACCESS_TOKEN is a credential and is NOT listed here;
# set it as an encrypted Secret in the Cloudflare Dashboard instead.
[vars]
SQUARE_ENVIRONMENT = "production"
SQUARE_LOCATION_ID = "LVZVXGQCTDSJM"
FRONTEND_URL = "https://www.tashskin.com"
